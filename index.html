<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毛选决策专家</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #141414;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #606060;
            --border-color: #2a2a2a;
            --accent-color: #ffffff;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transform: translateX(-100%);
        }

        .sidebar.open {
            transform: translateX(0);
            position: relative;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sidebar-logo svg {
            width: 32px;
            height: 32px;
            fill: var(--text-primary);
        }

        .sidebar-logo-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .sidebar-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .sidebar-menu-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .sidebar-menu-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .sidebar-menu-item span {
            font-size: 14px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer-content {
            text-align: center;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .sidebar-footer-logo {
            margin-bottom: 8px;
        }

        .sidebar-footer-logo svg {
            width: 40px;
            height: 40px;
            fill: var(--text-primary);
        }

        .sidebar-footer-text {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .sidebar-footer-contact {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            cursor: pointer;
        }

        /* 主内容区域 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 顶部导航 */
        .top-bar {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-button {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-button:hover {
            opacity: 0.8;
        }

        .menu-button svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .top-bar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar-logo svg {
            width: 28px;
            height: 28px;
            fill: var(--text-primary);
        }

        .top-bar-logo-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .new-chat-button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .new-chat-button:hover {
            background: var(--border-color);
        }

        /* 对话区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 80px 20px 100px;
            scroll-behavior: smooth;
        }

        .chat-message {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease;
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-avatar.assistant {
            background: var(--accent-color);
        }

        .chat-avatar.assistant svg {
            width: 18px;
            height: 18px;
            fill: var(--bg-primary);
        }

        .chat-avatar.user {
            background: var(--bg-tertiary);
        }

        .chat-avatar.user svg {
            width: 18px;
            height: 18px;
            fill: var(--text-primary);
        }

        .chat-content {
            flex: 1;
            max-width: 800px;
        }

        .chat-message.user .chat-content {
            max-width: 600px;
        }

        .chat-bubble {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.7;
            font-size: 15px;
            color: var(--text-primary);
        }

        .chat-message.user .chat-bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .chat-message.assistant .chat-bubble {
            background: transparent;
            padding: 0;
        }

        .chat-message.assistant .chat-text {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 15px;
            white-space: pre-wrap;
        }

        .chat-message.assistant .chat-text strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* 输入区域 */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 50px 14px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .input-box:focus-within {
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 1px var(--border-color);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            min-height: 24px;
            max-height: 200px;
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        .send-button {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: var(--text-primary);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.5;
        }

        .input-field:focus ~ .send-button,
        .input-field:not(:placeholder-shown) ~ .send-button {
            opacity: 1;
        }

        .send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-button svg {
            width: 16px;
            height: 16px;
            fill: var(--bg-primary);
        }

        /* 遮罩层 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .overlay.active {
            display: block;
        }

        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
                position: fixed;
            }

            .top-bar-logo-text {
                display: none;
            }

            .chat-message {
                gap: 12px;
            }

            .chat-avatar {
                width: 32px;
                height: 32px;
            }

            .input-container {
                padding: 12px 16px;
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }

            .input-box {
                padding: 12px 44px 12px 14px;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span class="sidebar-logo-text">毛选决策专家</span>
            </div>
            <p class="sidebar-subtitle">创业·职场·合作·家庭<br>四大场景决策分析</p>
        </div>

        <div class="sidebar-menu">
            <div class="sidebar-menu-item" onclick="showHistory()">
                <svg viewBox="0 0 24 24">
                    <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                </svg>
                <span>历史对话</span>
            </div>
            <div class="sidebar-menu-item" onclick="showSettings()">
                <svg viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.04.64.09.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>设置</span>
            </div>
            <div class="sidebar-menu-item" onclick="showHelp()">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
                </svg>
                <span>帮助</span>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-footer-content">
                <div class="sidebar-footer-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <p class="sidebar-footer-text">毛选决策专家<br>智能决策辅助系统</p>
                <div class="sidebar-footer-contact">联系我们</div>
            </div>
        </div>
    </aside>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 顶部导航 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-button" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <div class="top-bar-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <span class="top-bar-logo-text">毛选决策专家</span>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="new-chat-button" onclick="startNewChat()">
                    <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; fill: currentColor;">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    新对话
                </button>
            </div>
        </header>

        <!-- 对话区域 -->
        <div class="chat-area" id="chatArea">
            <!-- 欢迎消息 -->
            <div class="chat-message assistant">
                <div class="chat-avatar assistant">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="chat-content">
                    <div class="chat-text">你好！我是毛选决策专家，可以帮你进行智能决策分析。

请告诉我你遇到的决策问题，我会根据你的具体情况进行分析和引导。</div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea
                        id="userInput"
                        class="input-field"
                        placeholder="输入你的决策问题..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="sendButton" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 对话状态
        let conversationState = {
            messages: [],
            currentStep: 'initial', // initial, guiding, analyzing, completed
            gatheredInfo: {},
            topic: null // 'startup', 'career', 'cooperation', 'house', 'other'
        };

        // 侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        // 新对话
        function startNewChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="chat-message assistant">
                    <div class="chat-avatar assistant">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <div class="chat-content">
                        <div class="chat-text">你好！我是毛选决策专家，可以帮你进行智能决策分析。

请告诉我你遇到的决策问题，我会根据你的具体情况进行分析和引导。</div>
                    </div>
                </div>
            `;

            conversationState = {
                messages: [],
                currentStep: 'initial',
                gatheredInfo: {},
                topic: null
            };
        }

        // 识别话题
        function identifyTopic(text) {
            if (text.includes('创业') || text.includes('副业') || text.includes('开店')) {
                return 'startup';
            } else if (text.includes('跳槽') || text.includes('转型') || text.includes('辞职') || text.includes('职场')) {
                return 'career';
            } else if (text.includes('合伙') || text.includes('合作') || text.includes('伙伴')) {
                return 'cooperation';
            } else if (text.includes('买房') || text.includes('房产') || text.includes('置业')) {
                return 'house';
            }
            return 'other';
        }

        // 添加消息到对话区域
        function addMessage(type, content) {
            const chatArea = document.getElementById('chatArea');

            const messageHtml = `
                <div class="chat-message ${type}">
                    <div class="chat-avatar ${type}">
                        ${type === 'user'
                            ? '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
                            : '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>'
                        }
                    </div>
                    <div class="chat-content">
                        ${type === 'user'
                            ? `<div class="chat-bubble">${content}</div>`
                            : `<div class="chat-text">${content}</div>`
                        }
                    </div>
                </div>
            `;

            chatArea.insertAdjacentHTML('beforeend', messageHtml);
            chatArea.scrollTop = chatArea.scrollHeight;

            conversationState.messages.push({ type, content });
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;

            // 添加用户消息
            addMessage('user', text);
            input.value = '';

            // 禁用发送按钮
            document.getElementById('sendButton').disabled = true;

            // 处理对话逻辑
            setTimeout(() => {
                handleConversation(text);
                document.getElementById('sendButton').disabled = false;
            }, 1000);
        }

        // 处理对话逻辑
        function handleConversation(userInput) {
            const state = conversationState;

            switch (state.currentStep) {
                case 'initial':
                    // 识别话题
                    state.topic = identifyTopic(userInput);
                    state.currentStep = 'guiding';
                    state.gatheredInfo.initialQuery = userInput;

                    // 根据话题引导补充信息
                    const guideMessage = getGuideMessage(state.topic);
                    addMessage('assistant', guideMessage);
                    break;

                case 'guiding':
                    // 收集用户补充的信息
                    collectInfo(userInput);
                    state.gatheredInfo.userResponse = userInput;

                    // 检查信息是否足够
                    if (isInfoComplete(state.gatheredInfo)) {
                        state.currentStep = 'completed';
                        const analysisResult = getAnalysisResult(state.topic, state.gatheredInfo);
                        addMessage('assistant', analysisResult);
                    } else {
                        // 继续引导
                        const followUp = getFollowUpQuestion(state.topic, state.gatheredInfo);
                        addMessage('assistant', followUp);
                    }
                    break;

                case 'completed':
                    // 对话已完成，可以继续提问或开始新对话
                    addMessage('assistant', '这是一个新的决策问题吗？如果是，我们可以开始新的分析。如果不是，请告诉我你还需要了解什么。');
                    state.currentStep = 'initial';
                    break;
            }
        }

        // 获取引导消息
        function getGuideMessage(topic) {
            const guides = {
                startup: `收到创业决策的需求。为了给你更准确的分析，我需要了解一些关键信息：
